<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AML/CFT Awareness Course — Engel &amp; Völkers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"><\/script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px 20px 40px;
}
.top-label {
  text-align: center;
  color: rgba(255,255,255,0.55);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
  margin-top: 8px;
}
.card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  width: 100%;
  max-width: 1100px;
}
#slideArea img { width: 100%; height: auto; display: block; }
.footer {
  background: #f4f4f4;
  border-top: 1px solid #ddd;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.prog-wrap { flex: 1; min-width: 160px; }
.prog-text { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; }
.prog-bar { height: 6px; background: #ddd; border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; background: #cc0000; border-radius: 3px; transition: width 0.5s ease; }
.timer-box { display: flex; align-items: center; gap: 10px; }
.ring-wrap { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: #e0e0e0; stroke-width: 3.5; }
.ring-fg { fill: none; stroke: #cc0000; stroke-width: 3.5; stroke-linecap: round; transition: stroke-dashoffset 0.95s linear; }
.ring-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 14px; font-weight: 700; color: #cc0000; }
.timer-hint { font-size: 11px; color: #aaa; line-height: 1.5; }
.btn { padding: 11px 26px; border-radius: 6px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
.btn-next { background: #cc0000; color: #fff; }
.btn-next:hover { background: #aa0000; }
.btn-next:disabled { background: #ccc; color: #999; cursor: not-allowed; }
.panel { display: none; flex-direction: column; align-items: center; text-align: center; padding: 56px 40px; gap: 16px; }
.panel.show { display: flex; }
.icon-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.ic-green { background: #1a7a4a; }
.icon-circle svg { width: 34px; height: 34px; stroke: #fff; stroke-width: 3; fill: none; }
.panel-title { font-size: 24px; font-weight: 700; color: #1a1a2e; }
.panel-sub { font-size: 15px; color: #555; max-width: 520px; line-height: 1.7; }
.btn-green { background: #1a7a4a; color: #fff; padding: 13px 34px; font-size: 15px; border-radius: 7px; border: none; cursor: pointer; font-weight: 700; transition: background 0.2s; }
.btn-green:hover { background: #155e38; }
.btn-red { background: #cc0000; color: #fff; padding: 13px 34px; font-size: 15px; border-radius: 7px; border: none; cursor: pointer; font-weight: 700; transition: background 0.2s; }
.btn-red:hover { background: #aa0000; }
.btn-grey { background: #555; color: #fff; padding: 13px 34px; font-size: 15px; border-radius: 7px; border: none; cursor: pointer; font-weight: 700; transition: background 0.2s; }
.btn-grey:hover { background: #333; }
.quiz-panel { display: none; padding: 36px 40px 40px; }
.quiz-panel.show { display: block; }
.quiz-header { text-align: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 3px solid #cc0000; }
.quiz-header h2 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; }
.quiz-header p { font-size: 13px; color: #888; }
.fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
.field-row label { font-size: 13px; font-weight: 700; color: #444; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.field-row input { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; }
.field-row input:focus { border-color: #cc0000; }
.question-block { margin-bottom: 20px; padding: 20px; background: #fafafa; border-radius: 8px; border: 1.5px solid #eee; }
.question-block.correct { background: #f0faf4; border-color: #1a7a4a; }
.question-block.wrong { background: #fff5f5; border-color: #cc0000; }
.q-num { font-size: 11px; font-weight: 700; color: #cc0000; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.q-text { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; line-height: 1.5; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.option-label { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 6px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; font-size: 14px; color: #333; transition: all 0.15s; }
.option-label:hover { background: #f5f5f5; border-color: #bbb; }
.option-label input[type=radio] { accent-color: #cc0000; width: 16px; height: 16px; flex-shrink: 0; }
.option-label.selected { background: #fff0f0; border-color: #cc0000; }
.option-label.show-correct { background: #f0faf4; border-color: #1a7a4a; color: #1a7a4a; font-weight: 700; }
.option-label.show-wrong { background: #fff5f5; border-color: #cc0000; color: #cc0000; text-decoration: line-through; }
.q-feedback { margin-top: 10px; font-size: 13px; font-weight: 700; }
.q-feedback.pass { color: #1a7a4a; }
.q-feedback.fail { color: #cc0000; }
.submit-row { text-align: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid #eee; }
.btn-submit { background: #cc0000; color: #fff; padding: 15px 48px; font-size: 16px; border-radius: 7px; border: none; cursor: pointer; font-weight: 700; transition: background 0.2s; }
.btn-submit:hover { background: #aa0000; }
.result-panel { display: none; flex-direction: column; align-items: center; text-align: center; padding: 48px 40px; gap: 16px; }
.result-panel.show { display: flex; }
.score-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 7px solid; }
.score-circle.pass-col { border-color: #1a7a4a; background: #f0faf4; }
.score-circle.fail-col { border-color: #cc0000; background: #fff5f5; }
.score-big { font-size: 32px; font-weight: 700; }
.score-big.pass-col { color: #1a7a4a; }
.score-big.fail-col { color: #cc0000; }
.score-small { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.result-badge { font-size: 12px; font-weight: 700; padding: 5px 18px; border-radius: 20px; letter-spacing: 1.5px; text-transform: uppercase; }
.badge-pass { background: #1a7a4a; color: #fff; }
.badge-fail { background: #cc0000; color: #fff; }
.result-title { font-size: 24px; font-weight: 700; color: #1a1a2e; }
.result-sub { font-size: 15px; color: #555; max-width: 500px; line-height: 1.7; }
.btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
.sending-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.88); z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.sending-overlay.show { display: flex; }
.spinner { width: 52px; height: 52px; border: 5px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.sending-text { color: #fff; font-size: 16px; font-weight: 600; }
@media (max-width: 640px) {
  .options { grid-template-columns: 1fr; }
  .fields-grid { grid-template-columns: 1fr; }
  .footer { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="top-label">Engel &amp; V&ouml;lkers &mdash; AML/CFT Awareness Training</div>
<div class="card">
  <div id="slideArea">
    <img id="slideImg" src="" alt="Course slide" />
    <div class="footer" id="footer">
      <div class="prog-wrap">
        <div class="prog-text" id="progText">SLIDE 1 OF 9</div>
        <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:11%"></div></div>
      </div>
      <div class="timer-box">
        <div class="ring-wrap">
          <svg viewBox="0 0 40 40" width="46" height="46">
            <circle class="ring-bg" cx="20" cy="20" r="17"/>
            <circle class="ring-fg" id="ringFg" cx="20" cy="20" r="17"/>
          </svg>
          <div class="ring-num" id="ringNum">10</div>
        </div>
        <div class="timer-hint">Please read<br>this slide</div>
      </div>
      <button class="btn btn-next" id="nextBtn" disabled>Next &rarr;</button>
    </div>
  </div>
  <div class="panel" id="transPanel">
    <div class="icon-circle ic-green"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="panel-title">Course material complete!</div>
    <div class="panel-sub">You have reviewed all 9 slides.<br>You need <strong>80% or more (9 out of 11)</strong> to pass and receive your certificate.</div>
    <button class="btn-green" onclick="showQuiz()">Start Quiz &rarr;</button>
  </div>
  <div class="quiz-panel" id="quizPanel">
    <div class="quiz-header">
      <h2>AML/CFT Awareness &mdash; Unit 1 Assessment</h2>
      <p>11 questions &nbsp;&bull;&nbsp; Pass mark: 80% &nbsp;&bull;&nbsp; Please answer all questions</p>
    </div>
    <div class="fields-grid">
      <div class="field-row">
        <label for="staffName">Full Name</label>
        <input type="text" id="staffName" placeholder="e.g. Jean Martin" />
      </div>
      <div class="field-row">
        <label for="staffEmail">Email Address</label>
        <input type="email" id="staffEmail" placeholder="e.g. jean.martin@engelvoelkers.com" />
      </div>
    </div>
    <div id="questionsContainer"></div>
    <div class="submit-row">
      <button class="btn-submit" id="submitBtn" onclick="submitQuiz()">Submit Assessment</button>
    </div>
  </div>
  <div class="result-panel" id="resultPanel">
    <div class="score-circle" id="scoreCircle">
      <div class="score-big" id="scoreBig"></div>
      <div class="score-small">score</div>
    </div>
    <div class="result-badge" id="resultBadge"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="btn-row" id="btnRow"></div>
  </div>
</div>
<div class="sending-overlay" id="sendingOverlay">
  <div class="spinner"></div>
  <div class="sending-text" id="sendingText">Generating your certificate...</div>
</div>

  { q: "Why is it important to follow AML procedures?", opts: ["To slow down transactions","To protect the company and comply with regulations","To reduce paperwork","To avoid dealing with clients"], ans: 1 },
  { q: "What is the correct action if you are unsure about a situation?", opts: ["Ignore it","Guess the outcome","Escalate the concern","Ask another agent"], ans: 2 },
  { q: "What is the main goal of AML/CFT controls?", opts: ["Increase sales","Prevent financial crime and money laundering","Speed up transactions","Reduce documentation"], ans: 1 },
  { q: "Which statement is correct?", opts: ["You must prove money laundering","You must investigate clients","You must identify and report concerns","You decide if a transaction is illegal"], ans: 2 },
  { q: "You are dealing with a client who avoids giving clear details and delays documentation. What should you do?", opts: ["Proceed and collect documents later","Ignore the behaviour","Follow KYC procedures and escalate if concerns remain","Refuse to deal immediately"], ans: 2 }
];
var TOTAL_SLIDES = slides.length;
var SECS = 10;
var C = 2 * Math.PI * 17;
var current = 0;
var ticker = null;
var timeLeft = SECS;
var imgEl      = document.getElementById("slideImg");
var nextBtn    = document.getElementById("nextBtn");
var progText   = document.getElementById("progText");
var progFill   = document.getElementById("progFill");
var ringNum    = document.getElementById("ringNum");
var ringFg     = document.getElementById("ringFg");
var slideArea  = document.getElementById("slideArea");
var transPanel = document.getElementById("transPanel");
var quizPanel  = document.getElementById("quizPanel");
var resultPanel= document.getElementById("resultPanel");
ringFg.style.strokeDasharray = C;
ringFg.style.strokeDashoffset = 0;
function loadSlide(n) {
  imgEl.src = slides[n];
  progText.textContent = "SLIDE " + (n+1) + " OF " + TOTAL_SLIDES;
  progFill.style.width = (((n+1)/TOTAL_SLIDES)*100) + "%";
  startTimer();
}
function startTimer() {
  clearInterval(ticker);
  timeLeft = SECS;
  nextBtn.disabled = true;
  ringFg.style.stroke = "#cc0000";
  ringNum.style.color = "#cc0000";
  ringNum.textContent = timeLeft;
  ringFg.style.strokeDashoffset = 0;
  ticker = setInterval(function() {
    timeLeft--;
    ringNum.textContent = timeLeft;
    ringFg.style.strokeDashoffset = C * (1 - timeLeft / SECS);
    if (timeLeft <= 0) {
      clearInterval(ticker);
      nextBtn.disabled = false;
      ringNum.textContent = "✓";
      ringFg.style.stroke = "#1a7a4a";
      ringNum.style.color = "#1a7a4a";
    }
  }, 1000);
}
nextBtn.addEventListener("click", function() {
  current++;
  if (current >= TOTAL_SLIDES) {
    slideArea.style.display = "none";
    transPanel.classList.add("show");
  } else {
    loadSlide(current);
  }
});
function showQuiz() {
  transPanel.classList.remove("show");
  quizPanel.classList.add("show");
  buildQuiz();
}
function buildQuiz() {
  var container = document.getElementById("questionsContainer");
  container.innerHTML = "";
  questions.forEach(function(q, qi) {
    var block = document.createElement("div");
    block.className = "question-block";
    block.id = "qblock" + qi;
    var opts = "";
    q.opts.forEach(function(opt, oi) {
      opts += '<label class="option-label" id="opt_'+qi+'_'+oi+'">' +
              '<input type="radio" name="q'+qi+'" value="'+oi+'" onchange="selectOpt('+qi+','+oi+')">' +
              opt + '</label>';
    });
    block.innerHTML =
      '<div class="q-num">Question ' + (qi+1) + ' of ' + questions.length + '</div>' +
      '<div class="q-text">' + q.q + '</div>' +
      '<div class="options">' + opts + '</div>' +
      '<div class="q-feedback" id="fb'+qi+'"></div>';
    container.appendChild(block);
  });
}
function selectOpt(qi, oi) {
  for (var i = 0; i < questions[qi].opts.length; i++) {
    var l = document.getElementById("opt_"+qi+"_"+i);
    if (l) l.classList.remove("selected");
  }
  var sel = document.getElementById("opt_"+qi+"_"+oi);
  if (sel) sel.classList.add("selected");
}
function submitQuiz() {
  var name  = document.getElementById("staffName").value.trim();
  var email = document.getElementById("staffEmail").value.trim();
  if (!name)  { alert("Please enter your full name."); return; }
  if (!email || email.indexOf("@") < 0) { alert("Please enter a valid email address."); return; }
  var unanswered = [];
  questions.forEach(function(q, qi) {
    if (!document.querySelector('input[name="q'+qi+'"]:checked')) unanswered.push(qi+1);
  });
  if (unanswered.length > 0) {
    alert("Please answer all questions.\nUnanswered: Q" + unanswered.join(", Q"));
    return;
  }
  var score = 0;
  questions.forEach(function(q, qi) {
    var picked = parseInt(document.querySelector('input[name="q'+qi+'"]:checked').value);
    var block  = document.getElementById("qblock"+qi);
    var fb     = document.getElementById("fb"+qi);
    block.querySelectorAll("input[type=radio]").forEach(function(inp) { inp.disabled = true; });
    for (var i = 0; i < q.opts.length; i++) {
      var lbl = document.getElementById("opt_"+qi+"_"+i);
      lbl.classList.remove("selected");
      if (i === q.ans) lbl.classList.add("show-correct");
      else if (i === picked && picked !== q.ans) lbl.classList.add("show-wrong");
    }
    if (picked === q.ans) {
      score++;
      block.classList.add("correct");
      fb.className = "q-feedback pass";
      fb.textContent = "✓ Correct";
    } else {
      block.classList.add("wrong");
      fb.className = "q-feedback fail";
      fb.textContent = "✗ Incorrect — correct answer: " + String.fromCharCode(65+q.ans) + ". " + q.opts[q.ans];
    }
  });
  document.getElementById("submitBtn").style.display = "none";
  var pct    = Math.round((score / questions.length) * 100);
  var passed = pct >= 80;
  var now    = new Date();
  var dateStr = now.toLocaleDateString("en-GB", {day:"2-digit", month:"short", year:"numeric"}).replace(/ /g,"-").toUpperCase();
  quizPanel.classList.remove("show");
  resultPanel.classList.add("show");
  var circle   = document.getElementById("scoreCircle");
  var scoreBig = document.getElementById("scoreBig");
  var badge    = document.getElementById("resultBadge");
  var title    = document.getElementById("resultTitle");
  var sub      = document.getElementById("resultSub");
  var btnRow   = document.getElementById("btnRow");
  circle.className   = "score-circle "  + (passed ? "pass-col" : "fail-col");
  scoreBig.className = "score-big "     + (passed ? "pass-col" : "fail-col");
  scoreBig.textContent = pct + "%";
  badge.className    = "result-badge "  + (passed ? "badge-pass" : "badge-fail");
  badge.textContent  = passed ? "PASSED" : "NOT PASSED";
  title.textContent  = passed ? "Congratulations, " + name + "!" : "Keep going, " + name + "!";
  sub.textContent    = passed
    ? "You scored " + score + " out of " + questions.length + " (" + pct + "%). Your certificate is being generated and will be emailed to you shortly."
    : "You scored " + score + " out of " + questions.length + " (" + pct + "%). You need 80% to pass. Please review the material and try again.";
  btnRow.innerHTML = "";
  var reviewBtn = document.createElement("button");
  reviewBtn.className = "btn-grey";
  reviewBtn.textContent = "Review Answers";
  reviewBtn.onclick = function() { resultPanel.classList.remove("show"); quizPanel.classList.add("show"); window.scrollTo(0,0); };
  btnRow.appendChild(reviewBtn);
  if (!passed) {
    var retryBtn = document.createElement("button");
    retryBtn.className = "btn-red";
    retryBtn.textContent = "Retry Quiz";
    retryBtn.onclick = function() {
      resultPanel.classList.remove("show");
      document.getElementById("submitBtn").style.display = "inline-block";
      buildQuiz();
      quizPanel.classList.add("show");
      window.scrollTo(0,0);
    };
    btnRow.appendChild(retryBtn);
  }
  if (passed) { generateAndSendCertificate(name, email, score, questions.length, pct, dateStr); }
}
function generateAndSendCertificate(name, email, score, total, pct, dateStr) {
  var overlay     = document.getElementById("sendingOverlay");
  var sendingText = document.getElementById("sendingText");
  overlay.classList.add("show");
  sendingText.textContent = "Generating your certificate...";
  var logoImg   = new Image();
  var borderImg = new Image();
  var loaded    = 0;
  function onLoaded() {
    loaded++;
    if (loaded < 2) return;
    try {
      var { jsPDF } = window.jspdf;
      var doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
      var W = 297; var H = 210;
      doc.setFillColor(255,255,255);
      doc.rect(0, 0, W, H, "F");
      var logoW = 70;
      var logoH = logoW * (logoImg.height / logoImg.width);
      doc.addImage(logoImg, "JPEG", (W-logoW)/2, 12, logoW, logoH);
      doc.setFont("helvetica","bold");
      doc.setFontSize(22);
      doc.setTextColor(0,0,0);
      doc.text("CERTIFICATE  OF  TRAINING", W/2, 58, {align:"center"});
      doc.setFont("helvetica","normal");
      doc.setFontSize(11);
      doc.setTextColor(80,80,80);
      doc.text("This certifies that", W/2, 80, {align:"center"});
      doc.setFont("times","bolditalic");
      doc.setFontSize(42);
      doc.setTextColor(0,0,0);
      doc.text(name, W/2, 118, {align:"center"});
      var prefix  = "Has successfully scored ";
      var mid     = score + "/" + total + " (" + pct + "%)";
      var suffix  = " for";
      doc.setFont("helvetica","normal");
      doc.setFontSize(11);
      doc.setTextColor(80,80,80);
      var prefixW = doc.getTextWidth(prefix);
      doc.setFont("helvetica","bold");
      var midW    = doc.getTextWidth(mid);
      doc.setFont("helvetica","normal");
      var suffixW = doc.getTextWidth(suffix);
      var totalW  = prefixW + midW + suffixW;
      var startX  = (W - totalW) / 2;
      doc.text(prefix, startX, 138);
      doc.setFont("helvetica","bold");
      doc.text(mid, startX + prefixW, 138);
      doc.setFont("helvetica","normal");
      doc.text(suffix, startX + prefixW + midW, 138);
      doc.setFont("helvetica","bold");
      doc.setFontSize(12);
      doc.setTextColor(0,0,0);
      doc.text("MODULE 1 - INTRODUCTION TO MONEY LAUNDERING (AML)", W/2, 158, {align:"center"});
      doc.setFont("helvetica","normal");
      doc.setFontSize(11);
      doc.setTextColor(80,80,80);
      doc.text(dateStr, W/2, 176, {align:"center"});
      doc.addImage(borderImg, "PNG", 0, H-18, W, 18);
      var pdfBase64 = doc.output("datauristring").split(",")[1];
      sendingText.textContent = "Sending your certificate...";
      var payload = JSON.stringify({ name:name, email:email, score:score, total:total, pct:pct, date:dateStr, pdfData:pdfBase64 });
      var xhr = new XMLHttpRequest();
      xhr.open("POST", SCRIPT_URL, true);
      xhr.setRequestHeader("Content-Type", "text/plain");
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          overlay.classList.remove("show");
          try {
            var resp = JSON.parse(xhr.responseText);
            if (resp.success) {
              document.getElementById("resultSub").innerHTML =
                "You scored " + score + " out of " + total + " (" + pct + "%).<br><br>" +
                "<strong style='color:#1a7a4a'>&#10003; Certificate emailed to " + email + "</strong>";
            } else { showCertError(resp.error); }
          } catch(ex) {
            document.getElementById("resultSub").innerHTML =
              "You scored " + score + " out of " + total + " (" + pct + "%).<br><br>" +
              "<strong style='color:#1a7a4a'>&#10003; Certificate emailed to " + email + "</strong>";
          }
        }
      };
      xhr.onerror = function() { overlay.classList.remove("show"); showCertError("Network error"); };
      xhr.send(payload);
    } catch(ex) { overlay.classList.remove("show"); showCertError(ex.toString()); }
  }
  logoImg.onload   = onLoaded;
  borderImg.onload = onLoaded;
  logoImg.src   = LOGO_DATA;
  borderImg.src = BORDER_DATA;
}
function showCertError(err) {
  document.getElementById("resultSub").innerHTML =
    "You passed! However the certificate could not be sent automatically.<br>" +
    "Please contact <strong>mauritius@engelvoelkers.com</strong> to receive your certificate.<br><br>" +
    "<small style='color:#aaa'>Ref: " + (err||"Unknown") + "</small>";
}
loadSlide(0);
</script>
